<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THN_VISION | Elite Workflow</title>

    <!-- PWA & SEO -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="SME Workflow Automation - Powered by Google Cloud Shield">
    <meta name="theme-color" content="#020617">

    <!-- App Icon (Shield) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2322d3ee' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'%3E%3C/path%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23020617' stroke='%2322d3ee' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='24' height='24' rx='4' fill='%23020617'/%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z' stroke='%2322d3ee'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body, html {
            margin: 0; padding: 0; overflow: hidden; position: fixed;
            width: 100%; height: 100%; background-color: #020617;
            color: #22d3ee; font-family: ui-monospace, SFMono-Regular, monospace;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
        }
        .glow-cyan { text-shadow: 0 0 15px rgba(34, 211, 238, 0.6); }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(34, 211, 238, 0.1); }
        .tab-active { color: #22d3ee; border-bottom: 2px solid #22d3ee; background: rgba(34, 211, 238, 0.05); }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        .hud-scan { position: absolute; left: 0; width: 100%; height: 1px; background: rgba(34, 211, 238, 0.3); animation: scan 4s linear infinite; pointer-events: none; z-index: 60; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Inline Icons (SVG)
        const Icons = {
            Shield: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Cpu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="16" height="16" x="4" y="4" rx="2"/><path d="M15 2v2M9 2v2M2 15h2M2 9h2M20 15h2M20 9h2M15 20v2M9 20v2"/></svg>,
            Rocket: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>,
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Lock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Unlock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('briefing');
            const [isMember, setIsMember] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [status, setStatus] = useState('STANDBY');
            const [isLocked, setIsLocked] = useState(true);

            const SECRET_CODE = "THIT1503"; 

            const validateCode = () => {
                if (accessCode.toUpperCase() === SECRET_CODE) {
                    setIsMember(true);
                    setShowModal(false);
                }
            };

            return (
                <div className="flex flex-col h-[100dvh] w-full bg-slate-950 text-cyan-400 font-mono relative overflow-hidden">
                    <div className="hud-scan"></div>

                    {/* Header */}
                    <header className="px-6 pt-[var(--sat)] pb-4 border-b border-cyan-900/40 shrink-0 z-50 bg-slate-950/90 backdrop-blur-md">
                        <div className="flex justify-between items-end">
                            <div>
                                <h1 className="text-xl font-black tracking-tighter glow-cyan italic uppercase leading-none">THN_VISION_ELITE</h1>
                                <p className="text-[7px] text-cyan-800 font-bold uppercase tracking-widest mt-1">Dark Relay Protocol: Zero Garbage</p>
                            </div>
                            <div className="text-right">
                                <span className={`text-[9px] font-black px-2 py-0.5 rounded border ${isMember ? 'border-yellow-500 text-yellow-500' : 'border-cyan-900 text-cyan-900'}`}>
                                    {isMember ? 'ELITE_ACCESS' : 'GUEST_MODE'}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow relative overflow-y-auto p-6 pb-24 z-10">
                        
                        {/* 1. BRIEFING VIEW */}
                        {activeTab === 'briefing' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom duration-500">
                                <div className="border-l-2 border-cyan-500 pl-4 py-1">
                                    <h2 className="text-xl font-black text-white uppercase italic">Mission Briefing</h2>
                                    <p className="text-[10px] text-cyan-700 uppercase tracking-widest font-bold">Workflow Ecosystem for SME</p>
                                </div>

                                <div className="grid gap-3">
                                    <div className="glass-panel p-4 rounded-2xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-2 opacity-10"><Icons.Shield /></div>
                                        <h3 className="text-[11px] font-black uppercase text-white mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 bg-cyan-500 rounded-full"></span> Google Cloud Shield
                                        </h3>
                                        <p className="text-[9px] text-cyan-800 leading-relaxed uppercase">
                                            ธุรกรรมและความปลอดภัยผ่าน Google Cloud 100% พร้อมเกราะป้องกันระดับ Elite ที่ดึงความมั่นคงของ Google มาเป็นพื้นฐานให้เรา
                                        </p>
                                    </div>

                                    <div className="glass-panel p-4 rounded-2xl border-l-2 border-l-cyan-500">
                                        <h3 className="text-[11px] font-black uppercase text-cyan-400 mb-2 flex items-center gap-2">
                                            <Icons.Cpu /> A2A AI Intelligence
                                        </h3>
                                        <p className="text-[9px] text-cyan-800 leading-relaxed uppercase">
                                            Agent-to-Agent System ดึงความสามารถของ AI Overview มาช่วยวิเคราะห์และสรุปงาน SME ตั้งแต่ระดับ Low Cost ไปจนถึง Full Stack
                                        </p>
                                    </div>

                                    <div className="glass-panel p-4 rounded-2xl border-l-2 border-l-emerald-500">
                                        <h3 className="text-[11px] font-black uppercase text-emerald-500 mb-2 flex items-center gap-2">
                                            <Icons.Zap /> Zero Garbage Protocol
                                        </h3>
                                        <p className="text-[9px] text-cyan-800 leading-relaxed uppercase">
                                            ระบบจัดการที่เน้นความประหยัดและเสถียรสูงสุด ตัดส่วนเกินออกเพื่อให้ SME รันงานได้นิ่งและรวดเร็วในทุกสภาวะ
                                        </p>
                                    </div>
                                </div>

                                <div className="pt-4 text-center">
                                    <button onClick={() => setActiveTab('cockpit')} className="px-10 py-4 bg-cyan-600 text-slate-950 font-black rounded-2xl text-xs uppercase tracking-[0.2em] active:scale-95 transition-all shadow-[0_0_30px_rgba(8,145,178,0.3)]">
                                        เปิดระบบ Remote F-16
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 2. COCKPIT VIEW */}
                        {activeTab === 'cockpit' && (
                            <div className="h-full flex flex-col justify-center animate-in fade-in duration-300">
                                <div className="relative w-full aspect-square max-w-[200px] mx-auto flex items-center justify-center">
                                    <div className={`absolute inset-0 border-2 rounded-full border-cyan-500/10 ${status !== 'STANDBY' ? 'animate-spin' : ''}`} style={{animationDuration: '10s'}}></div>
                                    <div className="text-center">
                                        <div className={`text-4xl font-black tracking-widest uppercase italic ${status === 'STANDBY' ? 'text-slate-800' : 'text-cyan-400 animate-pulse'}`}>
                                            {status}
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-12 space-y-4 max-w-sm mx-auto w-full">
                                    <button 
                                        onClick={() => !isMember ? setShowModal(true) : setIsLocked(!isLocked)}
                                        className={`w-full py-4 rounded-xl flex items-center justify-center gap-3 border-2 transition-all active:scale-95 
                                            ${isLocked ? 'bg-red-950/10 border-red-900/40 text-red-600' : 'bg-emerald-950/10 border-emerald-900/40 text-emerald-500'}`}
                                    >
                                        {isLocked ? <Icons.Lock /> : <Icons.Unlock />}
                                        <span className="text-[10px] font-black tracking-widest uppercase">{isLocked ? 'Safety Locked' : 'Elite Bypass'}</span>
                                    </button>

                                    <button 
                                        onClick={() => !isMember ? setShowModal(true) : setStatus('F-16 ONLINE')}
                                        className={`w-full py-8 rounded-2xl flex flex-col items-center justify-center transition-all active:scale-[0.96] 
                                            ${isLocked ? 'bg-slate-900 text-slate-700 border border-slate-800' : 'bg-cyan-600 text-slate-950 shadow-[0_0_50px_rgba(34,211,238,0.4)]'}`}
                                    >
                                        <Icons.Rocket />
                                        <span className="mt-2 text-xs font-black tracking-[0.5em] uppercase">Start Engine Elite</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Footer */}
                    <nav className="fixed bottom-0 left-0 w-full shrink-0 border-t border-cyan-900/30 bg-slate-950 pb-[var(--sab)] z-50">
                        <div className="flex justify-around items-stretch h-16">
                            <button onClick={() => setActiveTab('briefing')} className={`flex-1 flex flex-col items-center justify-center transition-all ${activeTab === 'briefing' ? 'tab-active' : 'text-slate-700'}`}>
                                <Icons.Zap />
                                <span className="text-[8px] font-black mt-1 uppercase">Briefing</span>
                            </button>
                            <button onClick={() => setActiveTab('cockpit')} className={`flex-1 flex flex-col items-center justify-center transition-all ${activeTab === 'cockpit' ? 'tab-active' : 'text-slate-700'}`}>
                                <Icons.Rocket />
                                <span className="text-[8px] font-black mt-1 uppercase">Remote</span>
                            </button>
                            <button onClick={() => window.open('https://www.facebook.com/share/1FDdXmGS8V/', '_blank')} className="flex-1 flex flex-col items-center justify-center text-slate-700">
                                <Icons.Shield />
                                <span className="text-[8px] font-black mt-1 uppercase">Elite Page</span>
                            </button>
                        </div>
                    </nav>

                    {/* Elite Access Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/98 backdrop-blur-xl animate-in fade-in zoom-in duration-300">
                            <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-10 text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
                                <h2 className="text-2xl font-black text-white mb-2 uppercase italic tracking-tighter italic">Elite Authorization</h2>
                                <p className="text-[10px] text-cyan-800 uppercase tracking-widest mb-8 leading-relaxed">
                                    ระบบรีโมทควบคุม F-16 สงวนสิทธิ์สำหรับสมาชิก <br/> กรุณาใส่รหัส THN_VISION_ELITE
                                </p>

                                <div className="space-y-4">
                                    <input 
                                        type="text" 
                                        placeholder="ENTER ACCESS CODE"
                                        value={accessCode}
                                        onChange={(e) => setAccessCode(e.target.value)}
                                        className="w-full bg-slate-900/50 border-2 border-cyan-900/50 rounded-2xl py-5 text-center text-white font-black placeholder:text-slate-800 focus:border-cyan-500 outline-none uppercase tracking-widest"
                                    />
                                    <button 
                                        onClick={validateCode}
                                        className="w-full py-5 bg-cyan-600 text-slate-950 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all shadow-xl"
                                    >
                                        Verify Elite Access
                                    </button>
                                    <button onClick={() => setShowModal(false)} className="text-[9px] text-cyan-900 font-bold uppercase tracking-widest pt-4">
                                        กลับหน้าเดิม
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
