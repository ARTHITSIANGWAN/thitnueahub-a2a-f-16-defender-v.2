<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THN_VISION | Elite Cockpit</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23020617' stroke='%2322d3ee' stroke-width='2'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body, html {
            margin: 0; padding: 0; overflow: hidden; position: fixed;
            width: 100%; height: 100%; background-color: #020617;
            color: #22d3ee; font-family: ui-monospace, SFMono-Regular, monospace;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
        }
        .glow-cyan { text-shadow: 0 0 15px rgba(34, 211, 238, 0.6); }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(34, 211, 238, 0.1); }
        .tab-active { color: #22d3ee; border-bottom: 2px solid #22d3ee; background: linear-gradient(to top, rgba(34, 211, 238, 0.1), transparent); }
        
        /* อนิเมชั่นหน้าจอเรดาร์ */
        @keyframes radar-pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .radar-ring { position: absolute; border: 1px solid #22d3ee; border-radius: 50%; animation: radar-pulse 2s infinite; pointer-events: none; }
        
        /* เส้นแสกน HUD */
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        .hud-scan { position: absolute; left: 0; width: 100%; height: 2px; background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.4), transparent); animation: scan 4s linear infinite; pointer-events: none; z-index: 60; }

        /* ปุ่มหายใจ (Breathing) */
        @keyframes breathe { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
        .btn-ready { animation: breathe 2s infinite; box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Shield: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Cpu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="16" height="16" x="4" y="4" rx="2"/><path d="M15 2v2M9 2v2M2 15h2M2 9h2M20 15h2M20 9h2M15 20v2M9 20v2"/></svg>,
            Rocket: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>,
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Lock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Unlock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>,
            Activity: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('briefing');
            const [isMember, setIsMember] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [status, setStatus] = useState('STANDBY');
            const [isLocked, setIsLocked] = useState(true);
            const [dataStream, setDataStream] = useState("0x000");

            const SECRET_CODE = "THIT1503"; 

            // เอฟเฟกต์ตัวเลขสุ่ม (ดุ๊กดิ๊ก)
            useEffect(() => {
                const interval = setInterval(() => {
                    setDataStream(Math.random().toString(16).substring(2, 8).toUpperCase());
                }, 150);
                return () => clearInterval(interval);
            }, []);

            const validateCode = () => {
                if (accessCode.toUpperCase() === SECRET_CODE) {
                    setIsMember(true);
                    setShowModal(false);
                } else {
                    setAccessCode(""); // Reset if wrong
                }
            };

            const toggleEngine = () => {
                if (!isMember) {
                    setShowModal(true);
                } else if (!isLocked) {
                    setStatus('ENGAGING AI...');
                    setTimeout(() => setStatus('F-16_ELITE_ONLINE'), 1500);
                }
            };

            return (
                <div className="flex flex-col h-[100dvh] w-full bg-slate-950 text-cyan-400 font-mono relative overflow-hidden">
                    <div className="hud-scan"></div>

                    {/* Header */}
                    <header className="px-6 pt-[var(--sat)] pb-4 border-b border-cyan-900/40 shrink-0 z-50 bg-slate-950/90 backdrop-blur-md">
                        <div className="flex justify-between items-end">
                            <div>
                                <h1 className="text-xl font-black tracking-tighter glow-cyan italic uppercase leading-none">THN_VISION_V2.1</h1>
                                <p className="text-[7px] text-cyan-700 font-bold uppercase tracking-[0.3em] mt-1 italic">
                                    {isMember ? `CORE_DECRYPTED: ${dataStream}` : 'ENCRYPTED_SIGNAL_STREAM'}
                                </p>
                            </div>
                            <div className="text-right">
                                <span className={`text-[9px] font-black px-2 py-0.5 rounded-full border transition-all duration-500 ${isMember ? 'border-yellow-500 text-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.3)]' : 'border-cyan-900 text-cyan-900'}`}>
                                    {isMember ? 'ELITE_COMMANDER' : 'GUEST_PENDING'}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow relative overflow-y-auto p-6 pb-24 z-10">
                        
                        {activeTab === 'briefing' && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom duration-500">
                                <div className="border-l-4 border-cyan-500 pl-4 py-1 bg-cyan-500/5">
                                    <h2 className="text-xl font-black text-white uppercase italic tracking-widest">Operation Briefing</h2>
                                    <p className="text-[9px] text-cyan-600 uppercase font-bold">ThitNueaHub Infrastructure V2.1</p>
                                </div>

                                <div className="grid gap-4">
                                    {[
                                        { title: 'Cloud Shield', text: 'ระบบป้องกันระดับ Google Cloud 100% ปลอดภัยทุกลมหายใจ', icon: <Icons.Shield />, color: 'cyan' },
                                        { title: 'AI Intelligence', text: 'Agent-to-Agent สั่งการด้วยหัวใจของ Gemini 1.5 Pro', icon: <Icons.Cpu />, color: 'blue' },
                                        { title: 'Zero Waste', text: 'เน้นความนิ่งและประหยัด ตัดสิ่งไร้ประโยชน์เพื่อ SME', icon: <Icons.Zap />, color: 'emerald' }
                                    ].map((item, i) => (
                                        <div key={i} className="glass-panel p-5 rounded-3xl relative overflow-hidden group active:bg-cyan-500/10 transition-colors">
                                            <div className="flex items-start gap-4">
                                                <div className="mt-1 text-cyan-500">{item.icon}</div>
                                                <div>
                                                    <h3 className="text-[12px] font-black uppercase text-white mb-1">{item.title}</h3>
                                                    <p className="text-[9px] text-cyan-800 leading-relaxed uppercase tracking-tight">{item.text}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-6">
                                    <button onClick={() => setActiveTab('cockpit')} className="w-full py-5 bg-cyan-600 text-slate-950 font-black rounded-3xl text-xs uppercase tracking-[0.3em] active:scale-95 transition-all shadow-[0_0_40px_rgba(8,145,178,0.4)] btn-ready">
                                        ACCESS COCKPIT
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'cockpit' && (
                            <div className="h-full flex flex-col justify-center animate-in zoom-in-95 duration-300">
                                {/* Radar Display */}
                                <div className="relative w-full aspect-square max-w-[240px] mx-auto flex items-center justify-center">
                                    <div className="radar-ring w-full h-full"></div>
                                    <div className="radar-ring w-[70%] h-[70%]" style={{animationDelay: '0.5s'}}></div>
                                    <div className="radar-ring w-[40%] h-[40%]" style={{animationDelay: '1s'}}></div>
                                    
                                    <div className={`absolute inset-0 border-[1px] rounded-full border-cyan-500/20 ${status !== 'STANDBY' ? 'animate-spin' : ''}`} style={{animationDuration: '15s'}}></div>
                                    
                                    <div className="text-center z-10">
                                        <div className="flex justify-center mb-2"><Icons.Activity /></div>
                                        <div className={`text-2xl font-black tracking-widest uppercase italic transition-all duration-700 ${status === 'STANDBY' ? 'text-slate-800' : 'text-cyan-400 glow-cyan animate-pulse'}`}>
                                            {status}
                                        </div>
                                        <div className="text-[8px] text-cyan-900 mt-2 font-black tracking-[0.4em]">LAT: 15.03 / LNG: 19.87</div>
                                    </div>
                                </div>

                                <div className="mt-12 space-y-4 max-w-sm mx-auto w-full">
                                    <button 
                                        onClick={() => !isMember ? setShowModal(true) : setIsLocked(!isLocked)}
                                        className={`w-full py-4 rounded-2xl flex items-center justify-center gap-3 border-2 transition-all active:scale-95 
                                            ${isLocked ? 'bg-amber-950/10 border-amber-900/40 text-amber-600' : 'bg-emerald-950/10 border-emerald-900/40 text-emerald-500'}`}
                                    >
                                        {isLocked ? <Icons.Lock /> : <Icons.Unlock />}
                                        <span className="text-[10px] font-black tracking-widest uppercase">{isLocked ? 'Safety Switch: Locked' : 'Engine: Ready'}</span>
                                    </button>

                                    <button 
                                        onClick={toggleEngine}
                                        className={`w-full py-10 rounded-[2.5rem] flex flex-col items-center justify-center transition-all active:scale-[0.96] 
                                            ${isLocked ? 'bg-slate-900 text-slate-800 border border-slate-800' : 'bg-cyan-600 text-slate-950 shadow-[0_0_60px_rgba(34,211,238,0.5)] btn-ready'}`}
                                    >
                                        <Icons.Rocket />
                                        <span className="mt-4 text-xs font-black tracking-[0.6em] uppercase">Engage F-16 V2</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Nav */}
                    <nav className="fixed bottom-0 left-0 w-full border-t border-cyan-900/30 bg-slate-950 pb-[var(--sab)] z-50">
                        <div className="flex justify-around items-stretch h-20">
                            <button onClick={() => setActiveTab('briefing')} className={`flex-1 flex flex-col items-center justify-center transition-all ${activeTab === 'briefing' ? 'tab-active' : 'text-slate-700'}`}>
                                <Icons.Zap />
                                <span className="text-[9px] font-black mt-2 uppercase">Briefing</span>
                            </button>
                            <button onClick={() => setActiveTab('cockpit')} className={`flex-1 flex flex-col items-center justify-center transition-all ${activeTab === 'cockpit' ? 'tab-active' : 'text-slate-700'}`}>
                                <Icons.Rocket />
                                <span className="text-[9px] font-black mt-2 uppercase">Cockpit</span>
                            </button>
                            <button onClick={() => window.open('https://www.facebook.com/share/1FDdXmGS8V/', '_blank')} className="flex-1 flex flex-col items-center justify-center text-slate-800">
                                <Icons.Shield />
                                <span className="text-[9px] font-black mt-2 uppercase">Empire</span>
                            </button>
                        </div>
                    </nav>

                    {/* Elite Access Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/98 backdrop-blur-3xl animate-in fade-in duration-300">
                            <div className="glass-panel w-full max-w-sm rounded-[3rem] p-10 text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
                                <h2 className="text-2xl font-black text-white mb-2 uppercase italic tracking-tighter">Elite Login</h2>
                                <p className="text-[9px] text-cyan-800 uppercase tracking-widest mb-10 leading-relaxed">
                                    กรุณากรอกรหัสผ่านเพื่อยืนยันตัวตน <br/> ผู้บัญชาการ AI ประจำฐานทัพ
                                </p>

                                <div className="space-y-5">
                                    <input 
                                        type="text" 
                                        placeholder="PASSCODE"
                                        value={accessCode}
                                        onChange={(e) => setAccessCode(e.target.value)}
                                        className="w-full bg-slate-900 border-2 border-cyan-900/50 rounded-2xl py-6 text-center text-white font-black placeholder:text-slate-800 focus:border-cyan-500 outline-none uppercase tracking-[0.5em]"
                                    />
                                    <button 
                                        onClick={validateCode}
                                        className="w-full py-6 bg-cyan-600 text-slate-950 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all shadow-2xl"
                                    >
                                        Verify Identity
                                    </button>
                                    <button onClick={() => setShowModal(false)} className="text-[9px] text-slate-700 font-bold uppercase tracking-widest pt-4">
                                        Back to Hangar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
